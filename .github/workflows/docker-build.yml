name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build Image for tests
        uses: docker/build-push-action@v5
        with:
          context: ./microservices/simple-metrics-go
          load: true
          tags: ghcr.io/hoaqim/self-service-platform/simple-metrics-go:test
      
      - name: Run Trivy locally
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: 'ghcr.io/hoaqim/self-service-platform/simple-metrics-go:test'
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./microservices/simple-metrics-go
          push: true
          tags: ghcr.io/hoaqim/self-service-platform/simple-metrics-go:latest